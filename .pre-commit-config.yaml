minimum_pre_commit_version: "3.7.0"
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: app-eslint
        name: app-eslint (npm run lint)
        entry: npm run lint
        language: system
        pass_filenames: false
        files: ^(src/.*\.(ts|tsx|js|jsx)|tests/.*\.(ts|tsx|js|jsx)|eslint\.config\.mjs|next\.config\.ts|tailwind\.config\.ts|playwright\.config\.ts|postcss\.config\.mjs|package\.json)$
      - id: pipeline-ruff
        name: pipeline-ruff (uv run ruff check scripts)
        entry: bash -c 'cd pipeline && uv run ruff check scripts'
        language: system
        pass_filenames: false
        files: ^pipeline/(scripts/.*\.py|pyproject\.toml)$
      - id: pipeline-pyright
        name: pipeline-pyright (uv run pyright scripts/*)
        entry: bash -c 'cd pipeline && uv run pyright scripts/eval_dataset.py scripts/eval_metrics.py scripts/eval_reporting.py scripts/evaluate_model.py scripts/utils.py'
        language: system
        pass_filenames: false
        files: ^pipeline/(scripts/.*\.py|pyproject\.toml)$
