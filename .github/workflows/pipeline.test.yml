name: Fine-Tuning Pipeline Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - pipeline/**
      - .github/workflows/pipeline.test.yml

permissions:
  contents: read

concurrency:
  group: pipeline-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup UV
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync Dependencies
        run: uv sync --frozen

      - name: Ruff Lint
        run: uv run ruff check scripts

      - name: Pyright Lint
        run: uv run pyright scripts
