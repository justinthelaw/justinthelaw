name: Fine-Tuning Pipeline Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - pipeline/**
      - .github/workflows/pipeline.test.yml

permissions:
  contents: read

concurrency:
  group: pipeline-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Sync Dependencies
        run: uv sync --frozen

      - name: Ruff Lint
        run: uv run ruff check scripts

      - name: Pyright Lint
        run: uv run pyright scripts/eval_dataset.py scripts/eval_metrics.py scripts/eval_reporting.py scripts/evaluate_model.py scripts/utils.py
