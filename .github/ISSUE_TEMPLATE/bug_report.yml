name: Bug Report
description: Report a reproducible defect
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide enough detail to reproduce quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the problem
      placeholder: Unexpected behavior in...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Exact steps to reproduce the issue
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime/tool versions, and any relevant local setup
      placeholder: |
        OS:
        Runtime/tool versions:
        Repo version/commit:
    validations:
      required: true

  - type: textarea
    id: ci_context
    attributes:
      label: CI or Runner Context (if applicable)
      description: For workflow/action issues include runner image, workflow snippet, and storage before/after information.
      placeholder: |
        Runner image:
        Workflow snippet:
        Disk before/after:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs and Screenshots
      description: Paste stack traces or attach screenshots
    validations:
      required: false
